version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-local
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: test_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: .              # ✅ dùng root
      dockerfile: Dockerfile  # ✅ chỉ rõ file
    container_name: wallet-app
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"

volumes:
  mysql_data: